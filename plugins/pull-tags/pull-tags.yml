name: Pull Remote Tags
description: Add matching local tags from linked metadata providers without removing existing scene tags.
version: 1.0.3
url: https://github.com/mrx-31415/stash-plugins
exec:
  - python
  - "{pluginDir}/pull-tags.py"
interface: raw
errLog: info

settings:
  syncOnTagCreate:
    displayName: Sync when a tag is created
    description: Scan every scene after creating a local tag. This can be slow on large libraries.
    type: BOOLEAN
  syncOnStashIdChange:
    displayName: Sync when scene metadata IDs change
    description: Sync a scene after its linked metadata-provider IDs change.
    type: BOOLEAN

hooks:
  - name: sync after tag creation
    description: Optionally sync all scenes after creating a local tag.
    triggeredBy:
      - Tag.Create.Post
  - name: sync after metadata ID update
    description: Optionally sync a scene when its linked metadata-provider IDs change.
    triggeredBy:
      - Scene.Update.Post

tasks:
  - name: Sync remote tags
    description: Add matching local tags from metadata providers to all linked scenes.
